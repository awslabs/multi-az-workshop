# ~~ Generated by projen. To modify, edit .projenrc.ts and run "yarn projen".

name: release
run-name: ${{ inputs.dry_run && format('[DRY RUN] release by @{0}', github.actor) || '' }}
on:
  push:
    branches:
      - main
    paths:
      - content/**
      - static/**
      - contentspec.yaml
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip actual publishing)
        required: false
        type: boolean
  workflow_run:
    workflows:
      - deploy
    types:
      - completed
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      latest_commit: ${{ steps.git_remote.outputs.latest_commit }}
      tag_exists: ${{ steps.check_tag_exists.outputs.exists }}
      artifact_id: ${{ steps.upload_artifact.outputs.artifact-id }}
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Set git identity
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: release
        run: yarn projen release
      - name: Check if version has already been tagged
        id: check_tag_exists
        run: |-
          TAG=$(cat dist/releasetag.txt)
          ([ ! -z "$TAG" ] && git ls-remote -q --exit-code --tags origin $TAG && (echo "exists=true" >> $GITHUB_OUTPUT)) || (echo "exists=false" >> $GITHUB_OUTPUT)
          cat $GITHUB_OUTPUT
      - name: Check for new commits
        id: git_remote
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |-
          echo "latest_commit=$(git ls-remote origin -h "$GITHUB_REF" | cut -f1)" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
        shell: bash
      - name: Backup artifact permissions
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        run: cd dist && getfacl -R . > permissions-backup.acl
        continue-on-error: true
      - name: Upload artifact
        id: upload_artifact
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-artifact
          path: dist
          overwrite: true
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'push' && needs.gate.outputs.should_release == 'true')
    needs:
      - gate
  release_github:
    name: Publish to GitHub Releases
    needs: release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.release.outputs.artifact_id }}
          path: dist
      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Release
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          errout=$(mktemp)
                RELEASE_TAG=$(cat dist/releasetag.txt)
                
                # Check if this is a prerelease by looking for hyphen in tag (e.g., v1.0.0-alpha)
                if [[ "$RELEASE_TAG" == *"-"* ]]; then
                  echo "Creating prerelease: $RELEASE_TAG"
                  gh release create "$RELEASE_TAG" \
                    --title "$RELEASE_TAG" \
                    --prerelease \
                    -R $GITHUB_REPOSITORY \
                    -F dist/changelog.md \
                    --target $GITHUB_REF \
                    dist/content.zip 2> $errout && true
                else
                  echo "Creating release: $RELEASE_TAG"
                  gh release create "$RELEASE_TAG" \
                    --title "$RELEASE_TAG" \
                    -R $GITHUB_REPOSITORY \
                    -F dist/changelog.md \
                    --target $GITHUB_REF \
                    dist/content.zip 2> $errout && true
                fi
                
                exitcode=$?
                if [ $exitcode -ne 0 ] && ! grep -q "Release.tag_name already exists" $errout; then
                  cat $errout
                  exit $exitcode
                fi
  gate:
    runs-on: ubuntu-latest
    if: true
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check if src changed
        id: check
        run: |-
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # For push events, skip release if src/ changed (deploy will handle it)
          SRC_CHANGED=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename' | grep "^src/" || true)
          if [ -n "$SRC_CHANGED" ]; then
            echo "src/ changed — deploy will trigger release via workflow_run. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Content-only change — proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
