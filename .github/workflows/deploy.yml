# ~~ Generated by projen. To modify, edit .projenrc.ts and run "yarn projen".

name: deploy
on:
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - build
    types:
      - completed
jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      ref: ${{ steps.info.outputs.ref }}
      run_id: ${{ steps.info.outputs.run_id }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && (github.event.workflow_run.actor.login == 'hakenmt' || github.event.workflow_run.triggering_actor.login == 'hakenmt' || github.event.workflow_run.actor.login == 'github-actions[bot]' || github.event.workflow_run.triggering_actor.login == 'github-actions[bot]'))
    steps:
      - name: Determine ref and source run
        id: info
        run: |-
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                      echo "Manual trigger - deploying from main"
                      echo "ref=main" >> $GITHUB_OUTPUT
                      echo "run_id=" >> $GITHUB_OUTPUT
                    else
                      echo "Triggered by build run ${{ github.event.workflow_run.id }}"
                      echo "ref=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
                      echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
                    fi
      - name: Require approved PR review
        if: github.event_name == 'workflow_run'
        run: |-
          SHA="${{ github.event.workflow_run.head_sha }}"
                    REPO="${{ github.repository }}"

                    echo "Looking up PR for SHA $SHA"
                    PR_NUMBER=$(gh api "repos/$REPO/commits/$SHA/pulls" --jq '[.[] | select(.state == "open" or .state == "closed")] | first | .number')

                    if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
                      echo "::error::No PR found for SHA $SHA. Refusing to deploy."
                      exit 1
                    fi
                    echo "Found PR #$PR_NUMBER"

                    # Fetch the latest review per reviewer. Only APPROVED counts; any
                    # later CHANGES_REQUESTED or DISMISSED from the same reviewer voids
                    # their prior approval.
                    APPROVED=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
                      --jq '[.[] | select(.commit_id == "'"$SHA"'")] | group_by(.user.login) | map(sort_by(.submitted_at) | last) | [.[] | select(.state == "APPROVED")] | length')

                    echo "Approved reviews for this head SHA: $APPROVED"

                    if [ "$APPROVED" -lt 1 ]; then
                      echo "::error::PR #$PR_NUMBER does not have an approved review for SHA $SHA. Refusing to deploy."
                      exit 1
                    fi

                    echo "PR #$PR_NUMBER is approved for SHA $SHA"
  create-deployment:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment_id: ${{ steps.create.outputs.deployment_id }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REF: ${{ needs.resolve.outputs.ref }}
      REPO: ${{ github.repository }}
    steps:
      - name: Create deployment
        id: create
        run: |-
          set -euo pipefail
          jq -nc --arg ref "$REF" '{ref: $ref, environment: "AWS", auto_merge: false, required_contexts: []}' > /tmp/deployment.json
          echo "Payload:"; cat /tmp/deployment.json
          DEPLOYMENT_ID=$(gh api "repos/$REPO/deployments" --method POST --input /tmp/deployment.json --jq .id)
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Created deployment: $DEPLOYMENT_ID"
  build-from-main:
    needs:
      - resolve
      - create-deployment
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      CI: "true"
      PROJECT_NAME: ${{ github.event.repository.name }}
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout main (trusted)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: npx projen build
      - name: Upload content artifact
        uses: actions/upload-artifact@v7
        with:
          name: workshop-content
          path: dist/content.zip
          retention-days: 7
          if-no-files-found: error
  deploy:
    needs:
      - resolve
      - create-deployment
      - build-from-main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    environment:
      name: AWS
    env:
      CI: "true"
      PROJECT_NAME: ${{ github.event.repository.name }}
      BUCKET: ${{ secrets.BUCKET }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      DEPLOYMENT_ROLE: ${{ secrets.DEPLOYMENT_ROLE }}
    if: always() && needs.resolve.result == 'success' && needs.create-deployment.result == 'success' && (needs.build-from-main.result == 'success' || needs.build-from-main.result == 'skipped')
    steps:
      - name: Download content artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v8
        with:
          name: workshop-content
          path: dist
      - name: Download content artifact (from build run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: workshop-content
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve.outputs.run_id }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume: ${{ env.DEPLOYMENT_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
      - name: Deploy workshop to AWS
        run: |-
          set -euo pipefail
                    rm -rf tmp && mkdir -p tmp
                    unzip -q dist/content.zip -d tmp

                    ASSETS_PREFIX=$(date --utc +"%Y-%m-%dT%H-%M-%SZ")
                    echo "$ASSETS_PREFIX" > tmp/assets_prefix.txt

                    echo "Uploading assets to s3://$BUCKET/$ASSETS_PREFIX/"
                    aws s3 cp tmp "s3://$BUCKET/$ASSETS_PREFIX/" --recursive

                    set +e
                    aws cloudformation describe-stacks --stack-name "$PROJECT_NAME" --region "$AWS_REGION" >/dev/null 2>&1
                    EXISTS=$?
                    set -e

                    if [ $EXISTS -eq 0 ]; then
                      CHANGE_SET_TYPE=UPDATE; WAIT=update
                    else
                      CHANGE_SET_TYPE=CREATE; WAIT=create
                    fi
                    echo "Stack $CHANGE_SET_TYPE"

                    aws cloudformation create-change-set \
                      --change-set-type "$CHANGE_SET_TYPE" \
                      --stack-name "$PROJECT_NAME" \
                      --change-set-name "$PROJECT_NAME-$ASSETS_PREFIX" \
                      --template-url "https://$BUCKET.s3.$AWS_REGION.amazonaws.com/$ASSETS_PREFIX/$PROJECT_NAME.json" \
                      --parameters \
                        ParameterKey=AssetsBucketName,ParameterValue="$BUCKET" \
                        ParameterKey=AssetsBucketPrefix,ParameterValue="$ASSETS_PREFIX/" \
                        ParameterKey=ParticipantRoleName,ParameterValue=Admin \
                      --capabilities CAPABILITY_IAM \
                      --region "$AWS_REGION"

                    aws cloudformation wait change-set-create-complete \
                      --stack-name "$PROJECT_NAME" \
                      --change-set-name "$PROJECT_NAME-$ASSETS_PREFIX" \
                      --region "$AWS_REGION"

                    INITIAL_STATUS=$(aws cloudformation describe-stacks --stack-name "$PROJECT_NAME" --region "$AWS_REGION" --query 'Stacks[0].StackStatus' --output text)

                    aws cloudformation execute-change-set \
                      --stack-name "$PROJECT_NAME" \
                      --change-set-name "$PROJECT_NAME-$ASSETS_PREFIX" \
                      --region "$AWS_REGION"

                    while true; do
                      STATUS=$(aws cloudformation describe-stacks --stack-name "$PROJECT_NAME" --region "$AWS_REGION" --query 'Stacks[0].StackStatus' --output text)
                      if [ "$STATUS" != "$INITIAL_STATUS" ]; then
                        echo "Stack transitioned to: $STATUS"
                        break
                      fi
                      sleep 5
                    done

                    if ! aws cloudformation wait "stack-$WAIT-complete" --stack-name "$PROJECT_NAME" --region "$AWS_REGION"; then
                      echo "Deployment failed - cleaning up S3 prefix"
                      aws s3 rm "s3://$BUCKET/$ASSETS_PREFIX/" --recursive || true
                      exit 1
                    fi

                    echo "Deployment succeeded - cleaning up old S3 content"
                    aws s3 rm "s3://$BUCKET/" --recursive --exclude "$ASSETS_PREFIX/*" || true
  report-deployment:
    needs:
      - resolve
      - create-deployment
      - deploy
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    if: always() && needs.create-deployment.result == 'success'
    steps:
      - name: Report deployment status
        run: |-
          if [ "${{ needs.deploy.result }}" == "success" ]; then
                      STATE="success"
                    else
                      STATE="failure"
                    fi
                    gh api repos/${{ github.repository }}/deployments/${{ needs.create-deployment.outputs.deployment_id }}/statuses \
                      -f state=$STATE
                    echo "Deployment status: $STATE"
concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true
